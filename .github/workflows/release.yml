name: Release

on:
  push:
    tags:
      - "*.*.*" # triggers on tags like 1.0.0, 2.3.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. 1.5.0)"
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}
          path: apps/obsidian-plugin

      - name: Checkout decks-core
        uses: actions/checkout@v4
        with:
          repository: dscherdi/decks-core
          path: packages/decks-core

      - name: Create workspace glue
        run: |
          cat > pnpm-workspace.yaml << 'EOF'
          packages:
            - 'apps/*'
            - 'packages/*'
          allowBuilds:
            esbuild: true
            svelte-preprocess: true
            unrs-resolver: true
          EOF
          echo '{"name":"ci-workspace","private":true}' > package.json

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm --filter decks test:all

      - name: Build and package release
        working-directory: apps/obsidian-plugin
        run: pnpm build:release

      - name: Resolve release notes file
        id: release-notes
        working-directory: apps/obsidian-plugin
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          FILENAME=$(echo "$VERSION" | tr '.' '-').md
          FILEPATH="release-notes/$FILENAME"
          if [[ -f "$FILEPATH" ]]; then
            echo "path=apps/obsidian-plugin/$FILEPATH" >> "$GITHUB_OUTPUT"
            echo "Found release notes: $FILEPATH"
          else
            echo "No release notes file found at $FILEPATH"
            exit 1
          fi

      - name: Validate release files
        working-directory: apps/obsidian-plugin
        run: |
          echo "Validating release files..."
          required_files=(
            "./dist/main.js"
            "./dist/styles.css"
            "./dist/manifest.json"
            "./dist/README.md"
            "./dist/LICENSE"
          )

          missing_files=()
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              missing_files+=("$file")
            else
              echo "Found: $file"
            fi
          done

          if [[ ${#missing_files[@]} -gt 0 ]]; then
            echo "Missing files:"
            printf '  - %s\n' "${missing_files[@]}"
            exit 1
          fi

          echo "All release files validated successfully!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: ${{ steps.release-notes.outputs.path }}
          files: |
            apps/obsidian-plugin/dist/main.js
            apps/obsidian-plugin/dist/styles.css
            apps/obsidian-plugin/dist/manifest.json
            apps/obsidian-plugin/dist/README.md
            apps/obsidian-plugin/dist/LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
