name: Release

on:
  push:
    tags:
      - "*.*.*" # triggers on tags like 1.0.0, 2.3.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. 1.5.0)"
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build and package release
        run: npm run build:release

      - name: Resolve release notes file
        id: release-notes
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          FILENAME=$(echo "$VERSION" | tr '.' '-').md
          FILEPATH="release-notes/$FILENAME"
          if [[ -f "$FILEPATH" ]]; then
            echo "path=$FILEPATH" >> "$GITHUB_OUTPUT"
            echo "Found release notes: $FILEPATH"
          else
            echo "No release notes file found at $FILEPATH"
            exit 1
          fi

      - name: Validate release files
        run: |
          echo "Validating release files..."
          required_files=(
            "./dist/main.js"
            "./dist/styles.css"
            "./dist/manifest.json"
            "./dist/README.md"
            "./dist/LICENSE"
          )

          missing_files=()
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              missing_files+=("$file")
            else
              echo "Found: $file"
            fi
          done

          if [[ ${#missing_files[@]} -gt 0 ]]; then
            echo "Missing files:"
            printf '  - %s\n' "${missing_files[@]}"
            exit 1
          fi

          echo "All release files validated successfully!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: ${{ steps.release-notes.outputs.path }}
          files: |
            ./dist/main.js
            ./dist/styles.css
            ./dist/manifest.json
            ./dist/README.md
            ./dist/LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
